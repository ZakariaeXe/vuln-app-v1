<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Users</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); max-width: 800px; margin: auto; }
        h1, h2 { color: #333; }
        form { margin-bottom: 20px; }
        input[type="text"] { width: 300px; padding: 8px; margin-right: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Navigation Bar Styles */
        .navbar {
            background-color: #333;
            overflow: hidden;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .navbar ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex; /* Make links align horizontally */
            justify-content: center; /* Center the links */
        }
        .navbar li {
            float: left;
        }
        .navbar li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }
        .navbar li a:hover {
            background-color: #575757;
        }
    </style>
</head>
<body>
<div class="navbar">
    <ul>
        <li><a th:href="@{/}">Home</a></li>
        <li th:if="${session.user == null}"><a th:href="@{/login}">Login</a></li>
        <li th:if="${session.user == null}"><a th:href="@{/register}">Register</a></li>

        <li th:if="${session.user != null}">
            <a th:href="@{'/profile/' + ${session.user.id}}">Profile</a>
        </li>
        <li th:if="${session.user != null}">
            <a th:href="@{/search}">Search Users</a>
        </li>
        <li th:if="${session.user != null}">
            <a th:href="@{/xml-process}">XML Processor</a>
        </li>
        <li th:if="${session.user != null}">
            <a th:href="@{/fetch-url}">URL Fetcher</a>
        </li>
        <li th:if="${session.user != null}">
            <a th:href="@{/logout}">Logout</a>
        </li>
    </ul>
</div>

<div class="container">
    <h1>Search Users </h1>

    <form th:action="@{/search}" method="get">
        Search by Username: <input type="text" name="query" th:value="${query}"/><br>
        <button type="submit">Search</button>
    </form>

    <p th:if="${error}" class="error" th:text="${error}"></p>

    <div th:if="${searchResults != null and !searchResults.isEmpty()}">
        <h2>Results for "<span th:text="${query}"></span>"</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Password (Vulnerable Exposure!)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${searchResults}">
                <td th:text="${user.id}"></td>
                <td th:utext="${user.username}"></td> <td th:utext="${user.email}"></td>   <td th:text="${user.password}"></td> </tr>
            </tbody>
        </table>
    </div>
    <div th:if="${searchResults != null and searchResults.isEmpty() and query != null and !query.trim().isEmpty()}">
        <p>No users found for "<span th:text="${query}"></span>".</p>
    </div>
    <br>
    <p><a th:href="@{'/profile/' + ${session.user.id}}">Back to Profile</a> | <a th:href="@{/logout}">Logout</a></p>
</div>
</body>
</html>

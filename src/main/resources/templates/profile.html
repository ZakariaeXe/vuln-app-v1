<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User Profile</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
    .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); max-width: 600px; margin: auto; }
    h1, h2 { color: #333; }
    p { color: #555; }
    .error { color: red; font-weight: bold; }
    .critical { color: darkred; font-weight: bold; background-color: #ffe0e0; padding: 10px; border-radius: 5px; margin-top: 15px; }
    a { color: #007bff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Navigation Bar Styles */
    .navbar {
      background-color: #333;
      overflow: hidden;
      margin-bottom: 20px;
      border-radius: 8px;
    }
    .navbar ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex; /* Make links align horizontally */
      justify-content: center; /* Center the links */
    }
    .navbar li {
      float: left;
    }
    .navbar li a {
      display: block;
      color: white;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
    }
    .navbar li a:hover {
      background-color: #575757;
    }
  </style>
</head>
<body>
<div class="navbar">
  <ul>
    <li><a th:href="@{/}">Home</a></li>
    <li th:if="${session.user == null}"><a th:href="@{/login}">Login</a></li>
    <li th:if="${session.user == null}"><a th:href="@{/register}">Register</a></li>

    <li th:if="${session.user != null}">
      <a th:href="@{'/profile/' + ${session.user.id}}">Profile</a>
    </li>
    <li th:if="${session.user != null}">
      <a th:href="@{/search}">Search Users</a>
    </li>
    <li th:if="${session.user != null}">
      <a th:href="@{/xml-process}">XML Processor</a>
    </li>
    <li th:if="${session.user != null}">
      <a th:href="@{/fetch-url}">URL Fetcher</a>
    </li>
    <li th:if="${session.user != null}">
      <a th:href="@{/logout}">Logout</a>
    </li>
  </ul>
</div>

<div class="container">
  <h1>User Profile</h1>

  <p th:if="${error}" class="error" th:text="${error}"></p>

  <div th:if="${profileUser}">
    <p><strong>ID:</strong> <span th:text="${profileUser.id}"></span></p>
    <p><strong>Username:</strong> <span th:utext="${profileUser.username}"></span></p>
    <p><strong>Email:</strong> <span th:utext="${profileUser.email}"></span></p>

    <div class="critical">
      <h2>Critical Information (For Demonstration)</h2>
      <p th:utext="${criticalInfo}"></p>
    </div>
  </div>
  <br>
  <p><a th:href="@{/logout}">Logout</a></p>
</div>
</body>
</html>

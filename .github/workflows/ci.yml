# Workflow name, visible in GitHub Actions UI
name: Spring Boot CI Build & Deploy to GHCR

# 1. Triggers: Define when this workflow should run
on:
  push:
    branches:
      - main
      - vuln-gallery
  pull_request:
    branches:
      - main
      - vuln-gallery

# 2. Jobs: A workflow is composed of one or more jobs.
jobs:
  build-test-push-pull:
    runs-on: ubuntu-latest

    # Environment variables common to all steps (no dynamic lowercasing here)
    env:
      JAVA_VERSION: '21'
      MAVEN_CACHE_FOLDER: '~/.m2/repository'
      GHCR_APP_IMAGE_NAME: 'spring-gallery-app'

    # Steps: A sequence of tasks or scripts to execute within the job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- FIX HERE: New step to calculate and export lowercased GHCR path ---
      - name: Calculate Lowercase GHCR Path
        id: calculate_ghcr_path
        run: |
          # github.repository_owner (e.g., zakariaXe)
          # github.event.repository.name (e.g., demo2)
          # Convert owner to lowercase
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME_LOWER=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          # Assemble the full GHCR repository path (e.g., zakariaxe/demo2/spring-gallery-app)
          FULL_REPO_PATH="ghcr.io/$OWNER_LOWER/$REPO_NAME_LOWER/${{ env.GHCR_APP_IMAGE_NAME }}"
          
          # Export this as an output variable for subsequent steps
          echo "Calculated full GHCR image path: $FULL_REPO_PATH"
          echo "ghcr_image_path=$FULL_REPO_PATH" >> $GITHUB_OUTPUT
        shell: bash

      - name: Setup Java JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven (and Run Tests)
        run: mvn clean install -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: |
            ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:${{ github.sha }} 
            ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:latest

      - name: Push Docker Image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:${{ github.sha }}
            ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:latest

      - name: Pull Docker Image from GHCR (for verification)
        run: |
          echo "Attempting to pull image ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:latest from GHCR..."
          docker pull ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:latest
          echo "Image pull successful!"
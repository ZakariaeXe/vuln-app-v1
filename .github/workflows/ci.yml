name: Spring Boot CI Build & Deploy to GHCR

# 1. Triggers: Define when this workflow should run
on:
  push:
    branches:
      - vuln-gallery
  pull_request:
    branches:
      - vuln-gallery

# 2. Jobs: A workflow is composed of one or more jobs.
jobs:
  build-test-push-pull:
    runs-on: ubuntu-latest

    # Environment variables common to all steps (no dynamic lowercasing here)
    env:
      JAVA_VERSION: '21'
      MAVEN_CACHE_FOLDER: '~/.m2/repository'
      GHCR_APP_IMAGE_NAME: 'spring-gallery-app'


    # Steps: A sequence of tasks or scripts to execute within the job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        

      - name: Checkmarx SAST Scan
        uses: checkmarx-ts/checkmarx-cxflow-github-action@v1.6
        with:
          project: ${{ secrets.CHECKMARX_PROJECT }}
          checkmarx_url: ${{ secrets.CHECKMARX_URL }}
          checkmarx_username: ${{ secrets.CHECKMARX_USER }}
          checkmarx_password: '${{ secrets.CHECKMARX_PASSWORD }}'
          checkmarx_client_secret: ${{ secrets.CHECKMARX_CLIENT_SECRET }}
          scanners: sast
          bug_tracker: Sarif
          break_build: falseMore actions
          params: --namespace=${{ github.repository_owner }} --repo-name=${{ github.event.repository.name }} --branch=${{ github.ref_name }} --checkmarx.disable-clubbing=true --exclude-paths=.git,.github,target,logs

      - name: Upload SARIF file for SAST
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: cx.sarif
          category: sast

      - name: Calculate lowercase GHCR path
        id: calculate_ghcr_path
        run: |
          FULL_REPO_PATH="ghcr.io/$(echo "${{ github.repository_owner }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')/${{ env.GHCR_APP_IMAGE_NAME }}"
          echo "Calculated GHCR path: $FULL_REPO_PATH"
          echo "ghcr_image_path=$FULL_REPO_PATH" >> $GITHUB_OUTPUT


      - name: Setup Java JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
 #         cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven (and Run Tests)
        run: mvn clean install -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: |
            ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:${{ github.sha }} 
            ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:latest

      - name: Push Docker Image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:${{ github.sha }}
            ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:latest

      - name: Pull Docker Image from GHCR (for verification)
        run: |
          echo "Attempting to pull image ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:latest from GHCR..."
          docker pull ${{ steps.calculate_ghcr_path.outputs.ghcr_image_path }}:latest
          echo "Image pull successful!"
